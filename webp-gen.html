<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>BKDROP · WebP Gen Worker</title>
  <meta name="robots" content="noindex,nofollow">
  <style>body{margin:0;padding:8px;font-family:system-ui;background:#fafafa;color:#333;font-size:12px}</style>
</head>
<body>
  <div id="status">Cargando ffmpeg.wasm…</div>
  <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.10.1/dist/ffmpeg.min.js" crossorigin="anonymous"></script>
  <script>
    // Página aislada con COOP/COEP que ejecuta ffmpeg.wasm para convertir
    // un fragmento de video a WebP animado. Se comunica con el padre por
    // postMessage. NO toca DOM externo, NO accede a Firebase ni APIs.
    const $ = id => document.getElementById(id);

    let ffmpeg = null;
    let fetchFile = null;
    let loaded = false;

    function send(msg) {
      try { parent.postMessage(msg, '*'); } catch(_){}
    }

    (async () => {
      try {
        if (typeof FFmpeg === 'undefined') throw new Error('FFmpeg no se cargó (CDN)');
        const { createFFmpeg, fetchFile: ff } = FFmpeg;
        ffmpeg = createFFmpeg({
          log: false,
          corePath: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.10.0/dist/ffmpeg-core.js',
        });
        fetchFile = ff;
        ffmpeg.setProgress(({ ratio }) => {
          if (typeof ratio === 'number' && ratio >= 0 && ratio <= 1) {
            send({ type: 'progress', ratio });
          }
        });
        $('status').textContent = 'Inicializando ffmpeg…';
        await ffmpeg.load();
        loaded = true;
        $('status').textContent = '✅ Listo';
        send({ type: 'ready' });
      } catch (err) {
        $('status').textContent = '⚠️ ' + (err && err.message || 'Error desconocido');
        send({ type: 'error', message: err && err.message || 'load error' });
      }
    })();

    // Tope de tamaño objetivo: 1.5MB. Si el primer encode lo supera,
    // reintentamos con calidad/fps más bajos hasta entrar.
    const MAX_BYTES = 1.5 * 1024 * 1024;
    const ATTEMPTS = [
      { fps: 24, q: 75, label: '720×720 24fps · alta' },
      { fps: 24, q: 60, label: '720×720 24fps · media' },
      { fps: 20, q: 50, label: '720×720 20fps · media' },
      { fps: 18, q: 40, label: '720×720 18fps · ajustada' },
      { fps: 15, q: 30, label: '720×720 15fps · comprimida' },
      { fps: 12, q: 22, label: '720×720 12fps · mínima' },
    ];

    async function encodeOnce(inName, outName, startSec, fps, q) {
      try { ffmpeg.FS('unlink', outName); } catch(_){}
      // Filtro fijo: scale a 720 LLENANDO el cuadrado (increase) +
      // crop centrado. Nunca produce bandas negras.
      await ffmpeg.run(
        '-ss', String(Number(startSec) || 0),
        '-t', '3',
        '-i', inName,
        '-vf', 'fps=' + fps + ',scale=720:720:force_original_aspect_ratio=increase,crop=720:720',
        '-loop', '0',
        '-an',
        '-q:v', String(q),
        outName
      );
      const data = ffmpeg.FS('readFile', outName);
      return new Blob([data.buffer], { type: 'image/webp' });
    }

    window.addEventListener('message', async (e) => {
      const m = e.data || {};
      if (m.type !== 'process') return;
      if (!loaded) {
        send({ type: 'error', message: 'ffmpeg aún no terminó de cargar' });
        return;
      }
      const { file, startSec } = m;
      if (!file) { send({ type: 'error', message: 'sin archivo' }); return; }

      const ext = ((file.name || '').split('.').pop() || 'mp4').toLowerCase();
      const inName = 'in.' + (['mov','webm','mkv','avi','mp4'].includes(ext) ? ext : 'mp4');
      const outName = 'out.webp';

      try {
        try { ffmpeg.FS('unlink', inName); } catch(_){}
        try { ffmpeg.FS('unlink', outName); } catch(_){}

        $('status').textContent = 'Leyendo video…';
        ffmpeg.FS('writeFile', inName, await fetchFile(file));

        let blob = null;
        let attemptUsed = null;
        for (let i = 0; i < ATTEMPTS.length; i++) {
          const a = ATTEMPTS[i];
          $('status').textContent = 'Codificando ' + a.label + ' (intento ' + (i+1) + '/' + ATTEMPTS.length + ')…';
          send({ type: 'progress-attempt', index: i, total: ATTEMPTS.length, label: a.label });
          blob = await encodeOnce(inName, outName, startSec, a.fps, a.q);
          attemptUsed = a;
          if (blob.size <= MAX_BYTES) break;
        }

        try { ffmpeg.FS('unlink', inName); } catch(_){}
        try { ffmpeg.FS('unlink', outName); } catch(_){}

        const kb = Math.round(blob.size / 1024);
        $('status').textContent = '✅ Listo · ' + (kb >= 1024 ? (kb/1024).toFixed(2)+' MB' : kb+' KB') + ' · ' + attemptUsed.label;
        send({ type: 'result', blob, attempt: attemptUsed.label, sizeBytes: blob.size });
      } catch (err) {
        $('status').textContent = '⚠️ ' + (err && err.message || 'error');
        send({ type: 'error', message: err && err.message || 'process error' });
      }
    });
  </script>
</body>
</html>
